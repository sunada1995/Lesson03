<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勤怠画面</title>
</head>
<script>

	
  function showCurrentTime() {
  //現在時刻を取得するオブジェクトを作成
  const now = new Date();

  //Dateオブジェクトから｢時｣｢分｣｢秒｣の数値を取り出す
  const hour = String(now.getHours()).padStart(2, '0');
  const minute = String(now.getMinutes()).padStart(2, '0');
  const second = String(now.getSeconds()).padStart(2, '0');
  //表示を｢現在の時刻は○時△分×秒です｣の形に整える
　const time = `${hour}:${minute}:${second}`;

  //id=currentTimeを持つ要素内のテキストをtimeに代入された文字列に変更する
  document.getElementById('currentTime').textContent = time;
}
setInterval(showCurrentTime, 1000);

window.addEventListener("DOMContentLoaded", () => {
    const inputShainId = document.getElementById("shainId");
    const clockinBtn = document.getElementById("clockinId");
    const currentMonthAttendanceBtn = document.getElementById("currentMonthAttendanceId");
    const clockinTime = document.getElementById("clockinTimeId");
    const clockoutBtn = document.getElementById("clockoutId");
    const clockOutTime = document.getElementById("clockOutTimeId");

    //社員IDが入力済の場合
    if(inputShainId.value.trim() != ""){
		if(clockinTime.textContent != "" && clockOutTime.textContent == ""){ //出勤時刻が表示されていて退勤時間が表示されていない場合
			clockoutBtn.disabled = false; // 活性化 退勤ボタン
		}else if(clockOutTime.textContent != ""){ //退勤時刻が表示されている場合
			clockoutBtn.disabled = true; // 非活性化 退勤ボタン
			currentMonthAttendanceBtn.disabled = false; // 活性化 当月出退勤
		}
		else if(clockinTime.textContent == "" && clockOutTime.textContent == ""){
			currentMonthAttendanceBtn.disabled = false; // 活性化 当月出退勤
			clockinBtn.disabled = false;               // 活性化 出勤ボタン
			
		}
		
	}
    
    //社員ID入力時
    inputShainId.addEventListener("input", () => {
      if (inputShainId.value.trim() !== "") {        
        currentMonthAttendanceBtn.disabled = false; // 活性化 当月出退勤
        if(clockinTime.textContent == ""){
			clockinBtn.disabled = false;           // 活性化 出勤ボタン
		}
		if(clockinTime.textContent != ""){
			clockoutBtn.disabled = false;          // 活性化 退勤ボタン
		}
		if(clockOutTime.textContent != ""){
			clockoutBtn.disabled = true;           // 非活性化 退勤ボタン
		}      
      } else if(inputShainId.value.trim() == "") {
        clockinBtn.disabled = true;                // 非活性化 出勤ボタン
        clockoutBtn.disabled = true;  // 非活性化 退勤ボタン
        currentMonthAttendanceBtn.disabled = true;  // 非活性化 当月出退勤
      }
    });
  });
  

function checkForm(){
	const shainValue = document.getElementById('shainId').value;
	if(shainValue == ''){	
			alert('社員IDを入力してください');				    
			return false;			
		}	
	}


</script>
<body style="text-align: center; background-color:aquamarine;" >
</br>
<span>勤怠画面</span>
</br>
</br>

<form th:method="POST" onsubmit="return checkForm()" style="margin: auto; width: fit-content;">
	<span id="currentTime" style="background-color: black; color: yellow; font-size:2em;"></span>

       <table>
	     <tr>
	       <td>社員ⅠＤ :</td><td><input type="text" name="shainIdNumber" id="shainId" th:value="${session.shainIdText}"></td>
 	     </tr> 	     
 	     <tr>
	       <td>出勤時刻 : </td><td><span id="clockinTimeId" th:text="${session.clockinTime}"></span></td>
	     </tr>
	     <tr>
	       <td>退勤時刻 : </td><td><span id="clockOutTimeId" th:text="${session.clockOutTime}"></span></td>
	     </tr>	   
 	   </table>
 	   
 	   <button type="submit" name="stamping" id="clockinId" value ="clockin"  style=" background-color:red; color:ghostwhite; border-radius:5%; padding:1em 2.5em; font-size: 1em;" th:formaction="@{/duty}" disabled>出勤</button>
 	   <button type="submit" name="stamping" id="clockoutId" value ="clockout"  style=" background-color:blue; color:ghostwhite; border-radius:5%; padding:1em 2.5em; font-size: 1em;" th:formaction="@{/duty}" disabled>退勤</button>
 	   <button type="submit" name="stamping" id="currentMonthAttendanceId" value ="currentMonthAttendance"  style=" background-color:orange; color:ghostwhite; border-radius:5%; padding:1em 1.5em; font-size: 1em;" th:formaction="@{/ichiran/currentMonthAttendance}" disabled>当月出退勤</button>
</form>

</body>
</html>
