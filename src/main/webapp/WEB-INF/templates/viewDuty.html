<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>勤怠管理一覧画面</title>
</head>
<body style="text-align: center; background-color:aquamarine;" >
<span>勤怠管理一覧画面</span>

<form th:method="POST">
<button type="submit" name="stamping" id="clockoutId" value ="clockout"  style=" background-color:red; color:ghostwhite; border-radius:5%; padding:1em 2.5em; font-size: 1em;" th:formaction="@{/ichiran/back}">戻る</button>
</form>
<table style="margin: auto;">
    <thead>
        <tr>
            <th>日付</th>
            <th>出勤時刻</th>
            <th>退勤時刻</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="date : ${dates}">
            <!-- yyyy/MM/dd 形式で表示 -->
            <td th:text="${date}"></td>
        </tr>
        
        
    </tbody>
</table>
</body>
</html>
